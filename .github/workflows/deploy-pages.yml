name: Deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore deployed snapshot cache
        id: snapshot-cache
        uses: actions/cache/restore@v4
        with:
          path: .github/.cache/last-deployed-snapshot.txt
          key: deploy-snapshot-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            deploy-snapshot-${{ github.ref_name }}-

      - name: Resolve snapshot deployment state
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .github/.cache
          manifest="$(curl -fsSL https://athena-public-snapshots.oili.workers.dev/workouts/manifest.json)"
          current_snapshot="$(printf '%s' "$manifest" | jq -r '.generatedAt // .updatedAt // empty')"

          if [ -z "$current_snapshot" ]; then
            echo "Snapshot manifest is missing generatedAt/updatedAt" >&2
            exit 1
          fi

          previous_snapshot=""
          if [ -f .github/.cache/last-deployed-snapshot.txt ]; then
            previous_snapshot="$(tr -d '\r\n' < .github/.cache/last-deployed-snapshot.txt)"
          fi

          should_deploy=true
          reason="snapshot_changed"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            reason="manual_trigger"
          elif [ -n "$previous_snapshot" ] && [ "$previous_snapshot" = "$current_snapshot" ]; then
            should_deploy=false
            reason="snapshot_unchanged"
          elif [ -z "$previous_snapshot" ]; then
            reason="no_cached_snapshot"
          fi

          echo "current_snapshot=$current_snapshot" >> "$GITHUB_OUTPUT"
          echo "previous_snapshot=$previous_snapshot" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Skip unchanged snapshot deploy
        if: steps.snapshot.outputs.should_deploy != 'true'
        run: |
          echo "Skipping build and deploy."
          echo "Reason: ${{ steps.snapshot.outputs.reason }}"
          echo "Current snapshot: ${{ steps.snapshot.outputs.current_snapshot }}"
          echo "Previous snapshot: ${{ steps.snapshot.outputs.previous_snapshot }}"

      - name: Set up Node.js
        if: steps.snapshot.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.snapshot.outputs.should_deploy == 'true'
        run: npm ci

      - name: Build VitePress site
        if: steps.snapshot.outputs.should_deploy == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.snapshot.outputs.should_deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy docs/.vitepress/dist \
            --project-name sport-kiel \
            --branch main \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "${GITHUB_WORKFLOW}: ${GITHUB_EVENT_NAME}"

      - name: Persist deployed snapshot state
        if: steps.snapshot.outputs.should_deploy == 'true'
        shell: bash
        run: |
          mkdir -p .github/.cache
          printf '%s' "${{ steps.snapshot.outputs.current_snapshot }}" > .github/.cache/last-deployed-snapshot.txt

      - name: Save deployed snapshot cache
        if: steps.snapshot.outputs.should_deploy == 'true'
        uses: actions/cache/save@v4
        with:
          path: .github/.cache/last-deployed-snapshot.txt
          key: deploy-snapshot-${{ github.ref_name }}-${{ steps.snapshot.outputs.current_snapshot }}
